<!doctype html>
<html lang="es">
  <head>
    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Identidad de la app -->
    <title>Busco Profe | Portal laboral deportivo</title>
    <meta
      name="description"
      content="Busco Profe conecta profesores, entrenadores e instituciones deportivas en un portal laboral simple, moderno y especializado."
    />
    <link
      rel="icon"
      type="image/png"
      href="./src/assets/img/SILBATO_LOGO.webp"
    />
    <link rel="apple-touch-icon" href="./src/assets/img/SILBATO_LOGO.webp" />

    <!-- Color del navegador en mobile -->
    <meta name="theme-color" content="#2563eb" />

    <!-- Open Graph: vista previa al compartir el link -->
    <meta property="og:title" content="Busco Profe" />
    <meta
      property="og:description"
      content="Portal laboral deportivo para conectar profesores, entrenadores e instituciones."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./src/assets/img/SILBATO_LOGO.webp" />

    <!-- Twitter / X preview -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Busco Profe" />
    <meta
      name="twitter:description"
      content="Portal laboral deportivo para conectar profesores, entrenadores e instituciones."
    />
    <meta name="twitter:image" content="./src/assets/img/SILBATO_LOGO.webp" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
